<header class="header">
  <div class="brand-block">
    <div class="brand-mark">ET</div>

    <div class="brand-copy">
      <p class="eyebrow">Enterprise Task</p>
      <h1>Điều phối công việc văn phòng</h1>
    </div>
  </div>

  <div class="header-body">
    <div class="header-topline">
      <label class="search-shell" aria-label="Tìm kiếm công việc">
        <span class="search-icon">⌕</span>
        <input type="text" placeholder="Tìm theo tiêu đề, phòng ban hoặc deadline..." />
      </label>

      <div class="header-actions">
        <button
          class="action-btn theme-btn"
          type="button"
          [attr.aria-label]="themeMode() === 'dark' ? 'Chuyển sang giao diện sáng' : 'Chuyển sang giao diện tối'"
          (click)="toggleTheme()">
          <span class="theme-icon" aria-hidden="true">
            {{ themeMode() === 'dark' ? '☀' : '☾' }}
          </span>
        </button>

        <button class="action-btn" type="button" aria-label="Thông báo">
          <span class="action-icon">!</span>
          <span class="action-badge">3</span>
        </button>

        <div class="user-menu" [class.open]="isUserMenuOpen()">
          <button class="user-card" type="button" (click)="toggleUserMenu()">
            <div class="user-copy">
              <strong>{{ userProfile().name }}</strong>
              <span>{{ userProfile().role }}</span>
            </div>

            <div class="avatar">{{ userProfile().initials }}</div>
            <span class="menu-caret">▾</span>
          </button>

          <div class="user-dropdown" *ngIf="isUserMenuOpen()">
            <button type="button" (click)="openProfile()">Hồ sơ</button>
            <button type="button" class="danger" (click)="logout()">Đăng xuất</button>
          </div>
        </div>
      </div>
    </div>

    <div class="stats-strip">
      <div class="stat-chip" *ngFor="let stat of quickStats">
        <span class="stat-value">{{ stat.value }}</span>
        <span class="stat-label">{{ stat.label }}</span>
      </div>
    </div>
  </div>
</header>
