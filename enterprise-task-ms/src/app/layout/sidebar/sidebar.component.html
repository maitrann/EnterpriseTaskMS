<aside class="sidebar">
  <section class="workspace-card">
    <p class="workspace-label">Không gian làm việc</p>
    <h2>Khoi van phong</h2>
    <span class="workspace-meta">15 phòng ban đang theo dõi tiến độ</span>
  </section>

  <nav class="menu">
    <section class="menu-group" *ngFor="let group of menuGroups" [hidden]="group.adminOnly && !authService.isAdmin()">
      <p class="group-title">{{ group.title }}</p>

      <ng-container *ngFor="let item of group.items">
        <a
          *ngIf="item.route; else disabledItem"
          class="menu-item"
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }">
          <span class="item-copy">
            <strong>{{ item.label }}</strong>
            <small>{{ item.caption }}</small>
          </span>

          <span class="status-pill">Live</span>
        </a>

        <ng-template #disabledItem>
          <div class="menu-item is-disabled">
            <span class="item-copy">
              <strong>{{ item.label }}</strong>
              <small>{{ item.caption }}</small>
            </span>

            <span class="status-pill muted">Soon</span>
          </div>
        </ng-template>
      </ng-container>
    </section>
  </nav>

  <section class="support-card">
    <span class="support-tag">Chế độ dữ liệu mẫu</span>
    <p>UI hiện đang dùng dữ liệu giả lập để chốt luồng và bố cục trước khi nối với C# backend.</p>
  </section>
</aside>
