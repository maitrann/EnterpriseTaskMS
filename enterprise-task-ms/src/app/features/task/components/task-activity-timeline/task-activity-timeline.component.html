<div class="activity-wrapper">
  <div class="activity-list">
    <article class="activity-item" *ngFor="let activity of activitiesSorted()">
      <div class="activity-dot"></div>

      <div class="activity-content">
        <div class="activity-main">
          <strong>User {{ activity.userId }}</strong>
          <span>{{ getActionText(activity) }}</span>
        </div>

        <div class="activity-change" *ngIf="activity.oldValue || activity.newValue">
          <span>{{ activity.oldValue || 'Truoc do' }}</span>
          <span class="change-arrow">-></span>
          <span>{{ activity.newValue || 'Gia tri moi' }}</span>
        </div>

        <div class="activity-time">{{ formatTime(activity.createdAt) }}</div>
      </div>
    </article>
  </div>
</div>
