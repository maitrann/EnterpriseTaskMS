<div class="card" (click)="openDetail()">

  <div class="title">
    {{task.title}}
  </div>

  <div class="desc">
    {{task.description}}
  </div>

  <div class="meta">

    <span class="priority">
      {{task.priority}}
    </span>

    <span>
      {{task.progress}}%
    </span>

  </div>

</div>
