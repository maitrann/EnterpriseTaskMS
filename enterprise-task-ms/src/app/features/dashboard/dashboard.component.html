<div class="page-title">
  Overview
</div>

<div class="stats-grid">

  <div class="stat-card">
    <p>Total Tasks</p>
    <h2>{{ totalTasks() }}</h2>
  </div>

  <div class="stat-card">
    <p>Todo</p>
    <h2>{{ todoCount() }}</h2>
  </div>

  <div class="stat-card">
    <p>In Progress</p>
    <h2>{{ inProgressCount() }}</h2>
  </div>

  <div class="stat-card">
    <p>Completed</p>
    <h2>{{ doneCount() }}</h2>
  </div>

</div>
