<div class="forgot-shell">
  <section class="forgot-card">
    <p class="eyebrow">Mock password reset</p>
    <h1>Quen mat khau</h1>
    <p class="description">
      Man hinh nay dung de test workflow quen mat khau truoc khi tich hop email service that.
    </p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field-stack">
        <label for="forgot-email">Email tai khoan</label>
        <input id="forgot-email" type="email" formControlName="email" placeholder="admin@etms.local" />
        <small *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
          Vui long nhap email hop le.
        </small>
      </div>

      <button class="primary-btn" type="submit">Gui huong dan mock</button>
    </form>

    <div class="success-box" *ngIf="feedbackMessage()">{{ feedbackMessage() }}</div>

    <a class="back-link" routerLink="/login">Quay lai dang nhap</a>
  </section>
</div>
