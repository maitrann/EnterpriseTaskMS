<div class="forgot-shell">
  <section class="forgot-card">
    <p class="eyebrow">Đặt lại mật khẩu mẫu</p>
    <h1>Quên mật khẩu</h1>
    <p class="description">
      Màn hình này dùng để kiểm thử workflow quên mật khẩu trước khi tích hợp email service thật.
    </p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field-stack">
        <label for="forgot-email">Email tài khoản</label>
        <input id="forgot-email" type="email" formControlName="email" placeholder="admin@etms.local" />
        <small *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
          Vui lòng nhập email hợp lệ.
        </small>
      </div>

      <button class="primary-btn" type="submit">Gửi hướng dẫn mẫu</button>
    </form>

    <div class="success-box" *ngIf="feedbackMessage()">{{ feedbackMessage() }}</div>

    <a class="back-link" routerLink="/login">Quay lại đăng nhập</a>
  </section>
</div>
